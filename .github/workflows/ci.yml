name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  analyze-test-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.5"

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Minimum answer choices
        run: python tool/check_min_choices.py
